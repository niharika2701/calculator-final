name: Python application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create .env for CI
        run: |
          echo "CALCULATOR_LOG_DIR=logs" >> .env
          echo "CALCULATOR_HISTORY_DIR=history" >> .env
          echo "CALCULATOR_MAX_HISTORY_SIZE=100" >> .env
          echo "CALCULATOR_AUTO_SAVE=true" >> .env
          echo "CALCULATOR_PRECISION=10" >> .env
          echo "CALCULATOR_MAX_INPUT_VALUE=1e15" >> .env
          echo "CALCULATOR_DEFAULT_ENCODING=utf-8" >> .env
          echo "CALCULATOR_LOG_FILE=logs/calculator.log" >> .env
          echo "CALCULATOR_HISTORY_FILE=history/calculator_history.csv" >> .env

      - name: Run tests with coverage enforcement
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=90